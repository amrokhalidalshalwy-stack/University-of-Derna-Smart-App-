name: Deploy Firebase Functions

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./functions
        run: npm ci

      - name: Deploy Firebase Functions
        working-directory: ./functions
        run: npx firebase-tools deploy --only functions --project smart-college-app-442cd --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json

      - name: Setup credentials
        run: echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa.json
